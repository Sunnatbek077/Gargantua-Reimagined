# ============================================================
# FILE: crates/gargantua-ui/src/i18n/en.toml
# LINES: ~120
# CATEGORY: i18n — English translation strings (canonical source)
# PLATFORM: cross-platform (Mac + Windows + WASM)
# ============================================================
#
# PURPOSE:
#   English UI strings for all labels, buttons, tooltips, and
#   section headings in the Gargantua UI. This is the CANONICAL
#   source — all other language files (ru.toml, uz.toml) must
#   contain every key defined here. New UI text must be added
#   to ALL THREE .toml files simultaneously.
#
# KEY NAMING CONVENTION:
#   "module.widget_name"  e.g. "physics.spin_label"
#   Modules: physics, accretion, camera, postfx, bake, render,
#            export, menu, overlay, hud, preset, search, errors
#
# LOADED BY:
#   crates/gargantua-ui/src/i18n/mod.rs
#     → I18n::new(Language::En) loads this file via include_str!()
#     → I18n::t("key") returns the value for the given key
#
# ============================================================

