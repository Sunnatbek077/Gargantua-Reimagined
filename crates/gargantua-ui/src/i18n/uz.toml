# ============================================================
# FILE: crates/gargantua-ui/src/i18n/uz.toml
# LINES: ~120
# CATEGORY: i18n — Uzbek translation strings (O'zbek tili)
# PLATFORM: cross-platform (Mac + Windows + WASM)
# ============================================================
#
# PURPOSE:
#   O'zbek tili tarjimalari — barcha UI matnlari uchun.
#   en.toml da mavjud har bir kalit bu yerda bo'lishi shart.
#   Kalit topilmasa, I18n::t() kalit nomini o'zini qaytaradi
#   (hech qachon panic qilmaydi).
#
# ENCODING: UTF-8 (O'zbek lotin alifbosi uchun zarur)
#
# LOADED BY:
#   crates/gargantua-ui/src/i18n/mod.rs
#     → I18n::new(Language::Uz) loads this file via include_str!()
#
# TARJIMA ESLATMALARI:
#   - Fizika birliklari (M☉, G, K, nits) o'zgartirilmaydi
#   - Klaviatura qisqartmalari lotin harflarda qoladi (H, F1...)
#   - Bo'lim sarlavhalari Title Case da yoziladi
#
# ============================================================

