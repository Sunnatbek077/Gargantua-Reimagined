# ============================================================
# FILE: crates/gargantua-ui/src/i18n/ru.toml
# LINES: ~120
# CATEGORY: i18n — Russian translation strings
# PLATFORM: cross-platform (Mac + Windows + WASM)
# ============================================================
#
# PURPOSE:
#   Russian (Русский) translations for all UI strings.
#   Must contain every key defined in en.toml.
#   If a key is missing here, I18n::t() returns the key string
#   itself as a fallback (never panics).
#
# ENCODING: UTF-8 (required for Cyrillic characters)
#
# LOADED BY:
#   crates/gargantua-ui/src/i18n/mod.rs
#     → I18n::new(Language::Ru) loads this file via include_str!()
#
# TRANSLATION NOTES:
#   - Physics units (M☉, G, K, nits) are kept as-is (not translated)
#   - UI keyboard shortcuts remain in Latin (H, F1, F2...)
#   - Section headings use Title Case in Russian
#   - Tooltips should be concise (max ~80 chars per line)
#
# ============================================================

